name: Sync upstream release assets

permissions:
  contents: write

on:
  schedule:
    - cron: "0 4 * * *" # 12:00 UTC+8
  workflow_dispatch:

jobs:
  sync-upstream-release-assets:
    name: Sync latest upstream release assets
    runs-on: ubuntu-latest
    env:
      UPSTREAM_REPO: LibreSpark/LibreTV
      TARGET_REPO: KUAILESHANGWEI/LibreTV
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Sync release assets
        run: bash scripts/sync-upstream-release-assets.sh
